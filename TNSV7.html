<!-- ========================================================= -->
<!-- SHRINATHJI CINEMATIC LOADER -->
<!-- PUT THIS JUST AFTER <body> TAG -->
<!-- ========================================================= -->

<div class="shrinathji-loader">

  <!-- DARK OVERLAY -->

  <div class="loader-overlay"></div>

  <!-- FEET -->

  <div class="feet-container">

    <img
      class="feet-image"
      src="https://i.imgur.com/8mR8N5M.png"
      alt="Shrinathji Feet"
    >

  </div>

  <!-- GLOW -->

  <div class="loader-glow"></div>

  <!-- TEXT -->

  <div class="loader-text">

    <small>
      SHRINATHJI SEVA • NATHDWARA
    </small>

    <h1>
      THE NATHDWARA STORE
    </h1>

    <p>
      Entering Divine Darshan...
    </p>

  </div>

</div>

<style>

  /* ========================================================= */
  /* SHRINATHJI CINEMATIC LOADER */
  /* ========================================================= */

  .shrinathji-loader{

    position:fixed;
    inset:0;

    z-index:999999;

    overflow:hidden;

    background:#060504;

  }

  .loader-overlay{

    position:absolute;
    inset:0;

    background:
    radial-gradient(circle at center,
    rgba(214,171,74,.15),
    #060504 70%);

  }

  /* ========================================================= */
  /* FEET IMAGE */
  /* ========================================================= */

  .feet-container{

    position:absolute;

    width:100%;
    height:100%;

    overflow:hidden;

    display:flex;
    justify-content:center;

  }

  .feet-image{

    position:absolute;

    width:650px;

    bottom:-250px;

    opacity:.92;

    animation:
    darshanReveal 6s ease forwards;

    filter:
    drop-shadow(0 0 40px rgba(214,171,74,.25));

  }

  @keyframes darshanReveal{

    0%{

      transform:
      translateY(0px)
      scale(1.25);

      opacity:0;

    }

    20%{

      opacity:1;

    }

    100%{

      transform:
      translateY(-850px)
      scale(1);

      opacity:1;

    }

  }

  /* ========================================================= */
  /* GLOW */
  /* ========================================================= */

  .loader-glow{

    position:absolute;

    width:900px;
    height:900px;

    border-radius:50%;

    background:
    radial-gradient(circle,
    rgba(214,171,74,.16),
    transparent 70%);

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    animation:pulseGlow 5s infinite;

  }

  @keyframes pulseGlow{

    0%{

      transform:
      translate(-50%,-50%)
      scale(.8);

      opacity:.5;

    }

    50%{

      transform:
      translate(-50%,-50%)
      scale(1.05);

      opacity:1;

    }

    100%{

      transform:
      translate(-50%,-50%)
      scale(.8);

      opacity:.5;

    }

  }

  /* ========================================================= */
  /* TEXT */
  /* ========================================================= */

  .loader-text{

    position:absolute;

    bottom:90px;

    width:100%;

    text-align:center;

    z-index:5;

  }

  .loader-text small{

    color:#d6ab4a;

    letter-spacing:10px;

    text-transform:uppercase;

    display:block;

    margin-bottom:25px;

    font-size:12px;

  }

  .loader-text h1{

    font-size:80px;

    line-height:.95;

    color:#f5e6c8;

    font-family:'Cinzel', serif;

    margin-bottom:25px;

  }

  .loader-text p{

    color:rgba(255,255,255,.65);

    letter-spacing:4px;

  }

  /* ========================================================= */
  /* MOBILE */
  /* ========================================================= */

  @media(max-width:768px){

    .feet-image{

      width:380px;

      animation:
      darshanRevealMobile 6s ease forwards;

    }

    @keyframes darshanRevealMobile{

      0%{

        transform:
        translateY(0px)
        scale(1.2);

        opacity:0;

      }

      20%{

        opacity:1;

      }

      100%{

        transform:
        translateY(-500px)
        scale(1);

        opacity:1;

      }

    }

    .loader-text h1{

      font-size:42px;

    }

  }

</style>

<script>

  /* ========================================================= */
  /* REMOVE LOADER */
  /* ========================================================= */

  window.addEventListener('load',()=>{

    setTimeout(()=>{

      gsap.to('.shrinathji-loader',{

        opacity:0,
        duration:1.5,
        pointerEvents:'none',

        onComplete:()=>{

          document.querySelector('.shrinathji-loader').remove()

        }

      })

    },6500)

  })

</script>
